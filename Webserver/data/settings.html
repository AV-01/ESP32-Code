<!DOCTYPE html>
<html>

<style>
    body {
  font-family:sans-serif;
  line-height: 1.6;
  color: #333;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 2.5em;
  color: #111;
  margin-bottom: 0.5em;
}

input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box; /* Ensures padding doesn't affect width */
  font-family: inherit;
}
button{
    margin-top: 10px;
}
</style>

<body>
<h1>Machine Settings</h1>

<form id="settingsForm" onsubmit="saveSettings(event)">
<label>X Min</label>
<input type="number" id="X_MIN" name="X_MIN" required step=".001"></input>

<label>X Max</label>
<input type="number" id="X_MAX" name="X_MAX" required step=".001"></input>

<label>Y Min</label>
<input type="number" id="Y_MIN" name="Y_MIN" required step=".001"></input>

<label>Y Max</label>
<input type="number" id="Y_MAX" name="Y_MAX" required step=".001"></input>

<label>Z Safe</label>
<input type="number" id="Z_SAFE" name="Z_SAFE" required step=".001"></input>

<label>Z Draw</label>
<input type="number" id="Z_DRAW" name="Z_DRAW" required step=".001"></input>

<label>F Travel</label>
<input type="number" id="F_TRAVEL" name="F_TRAVEL" required step=".001"></input>

<label>F Draw</label>
<input type="number" id="F_DRAW" name="F_DRAW" required step=".001"></input>

<label>F Z</label>
<input type="number" id="F_Z" name="F_Z" required step=".001"></input>

<label>Line Spacing</label>
<input type="number" id="LINE_SPACING" name="LINE_SPACING" required step=".001"></input>

<label>Top Margin</label>
<input type="number" id="TOP_MARGIN" name="TOP_MARGIN" required step=".001"></input>

<label>Float Offset</label>
<input type="number" id="FLOAT_OFFSET" name="FLOAT_OFFSET" required step=".001"></input>

<label>Left Margin</label>
<input type="number" id="LEFT_MARGIN" name="LEFT_MARGIN" required step=".001"></input>


<button type="submit" id="saveBtn">Submit</button>
<div id="status"></div>
</form>

<script>
  document.addEventListener("DOMContentLoaded", async()=>{
    try{
      const response = await fetch("/fonts/settings.json", {cache: "no-store"});
      if(response.ok){
        const data = await response.json();
        for(const [key, value] of Object.entries(data)){
          const input = document.getElementById(key);
          if(input){
            input.value = value;
          }
        }
      }else{
        document.getElementById("status").style.color = "red";
        document.getElementById("status").textContent = "Failed to load current settings";
      }
    }catch(err){
        document.getElementById("status").style.color = "red";
        document.getElementById("status").textContent = "Network error loading settings";
    }
  });

  async function saveSettings(e){
    e.preventDefault();

    const form = document.getElementById("settingsForm");
    const formData = new FormData(form);
    const data = new URLSearchParams(formData);

    const btn = document.getElementById("saveBtn");
    const status = document.getElementById("status");
    btn.textContent = "Saving...";
    btn.disabled = true;
    status.textContent = "";
    try{
      const response = await fetch("/save-settings", {
        method:"POST",
        headers: {
          "Content-Type" : "application/x-www-form-urlencoded",
        },
        body: data.toString()
      });
      if(response.ok){
        status.style.color = "green";
        status.textContent = "Settings saved!";
      } else{
        const errText = await response.text();
        status.style.color = "red";
        status.textContent = "Failed to save: " + errText;
      }
    } catch(err){
      status.style.color = "red";
      status.textContent = "Network error while saving, check console log";
      console.error("error while saving",err);
    }finally{
      btn.textContent = "submit";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
