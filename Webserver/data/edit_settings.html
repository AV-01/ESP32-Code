<!DOCTYPE html>
<html>

<style>
    body {
  font-family:sans-serif;
  line-height: 1.6;
  color: #333;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 2.5em;
  color: #111;
  margin-bottom: 0.5em;
}

input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box; /* Ensures padding doesn't affect width */
  font-family: inherit;
}
button{
    margin-top: 10px;
}
</style>

<body>
<h1>Settings Data</h1>

<form action="/save-config" method="POST">
<label>X Min</label>
<input type="text" id="x_min" name="x_min" placeholder=""></input>

<label>X Max</label>
<input type="text" id="x_max" name="x_max" placeholder=""></input>

<label>Y Min</label>
<input type="text" id="y_min" name="y_min" placeholder=""></input>

<label>Y Max</label>
<input type="text" id="y_max" name="y_max" placeholder=""></input>

<label>Z Safe</label>
<input type="text" id="y_max" name="y_max" placeholder=""></input>

<label>Z Draw</label>
<input type="text" id="z_draw" name="z_draw" placeholder=""></input>

<label>F Travel</label>
<input type="text" id="f_travel" name="f_travel" placeholder=""></input>

<label>F Draw</label>
<input type="text" id="f_draw" name="f_draw" placeholder=""></input>

<label>F Z</label>
<input type="text" id="f_z" name="f_z" placeholder=""></input>

<label>Line Spacing</label>
<input type="text" id="line_spacing" name="line_spacing" placeholder=""></input>

<label>Top Margin</label>
<input type="text" id="top_margin" name="top_margin" placeholder=""></input>

<label>Float Offset</label>
<input type="text" id="float_offset" name="float_offset" placeholder=""></input>

<label>Left Margin</label>
<input type="text" id="left_margin" name="left_margin" placeholder=""></input>


<button type="submit">Submit</button>

</form>
</body>
</html>
