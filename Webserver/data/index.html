<!DOCTYPE html>
<html>

<style>
    body {
  font-family:sans-serif;
  line-height: 1.6;
  color: #333;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 2.5em;
  color: #111;
  margin-bottom: 0.5em;
}

input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box; /* Ensures padding doesn't affect width */
  font-family: inherit;
}
button{
    margin-top: 10px;
}
</style>

<body>
<h1>Homework Solver</h1>

<label>Gemini API key:</label>
<input type="password" id="api_key" placeholder="Insert API Key Here"></input>


<label>Upload Homework Image:</label>
<input type="file" id="homeworkImage"  accept="image/*" /></input>

<button id="submit" onclick="solveHomework()">Submit</button>

<div id="response"></div>
</body>

<script>
    async function solveHomework(){
        const apiKey = document.getElementById("api_key").value;
        const fileData = document.getElementById("homeworkImage");
        const responseDiv = document.getElementById("response");
        if(apiKey === ""){
            return alert("Insert an API Key!");
        }
        // if(fileData.files.length === 0){
        //     return alert("Upload some homework!");
        // }
        
        responseDiv.innerText = "Solving...";

        const payload = {
            contents: [{
                parts:[
                    {text:"Write a funny joke about pizza."}
                ]
            }]
        }
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
            {
                method:"POST",
                headers: { 'Content-Type' : 'application/json'},
                 body: JSON.stringify(payload)
            }
        );
        const result = await response.json();

        console.log(result);
        console.log(result.candidates[0].content.parts[0].text);
        // const responseDiv = getElementById('response');
        responseDiv.innerText = result.candidates[0].content.parts[0].text;
    }


</script>
</html>
