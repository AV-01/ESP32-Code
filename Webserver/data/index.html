<!DOCTYPE html>
<html>

<style>
    body {
  font-family:sans-serif;
  line-height: 1.6;
  color: #333;
  max-width: 800px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  font-size: 2.5em;
  color: #111;
  margin-bottom: 0.5em;
}

input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box; /* Ensures padding doesn't affect width */
  font-family: inherit;
}
button{
    margin-top: 10px;
}
</style>

<body>
<h1>Homework Solver V2</h1>

<label>AI Prompt: </label>
<input type="text" id="prompt" placeholder="This prompt gets sent to the AI with your files" value="Analyze attached homework images. Provide short, brief answers to the questions. Write like a high schooler."></input>


<label>Upload Homework Image:</label>
<input type="file" id="homeworkImage" multiple accept="image/*" /></input>

<label>SD Card Folder: </label>
<input type="text" id="folderName" placeholder="ex: HomeworkAnswers" value="HWFolder"></input>

<label>SD Card File Name: </label>
<input type="text" id="fileName" placeholder="ex: todaysDate.gcode" value = "HWFile.gcode"></input>

<button id="submit" onclick="solveHomework()">1. AI Solve</button>
<button id="btnGcode" onclick="convertToGcode()">2. Create GCode</button>
<button id="btnGcode" onclick="sendToSD()">3. Send to SD card</button>

<button id="btnAll" onclick="doAll()">DO ALL(not recommended)</button>
<div id="response" contenteditable="true"></div>
</body>

<script src="/font_engine.js"></script>

<script>
    let currentAIResponse = "";
    let currentGCode = "";

    async function fileToBase64(file) {
        return new Promise((resolve, reject) =>{
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () =>{
                const base64Data = reader.result.split(',')[1];
                resolve({
                    inline_data: {
                        mime_type: file.type,
                        data: base64Data
                    }
                });
            };
            reader.onerror = error => reject(error);
        });
    }
    async function solveHomework(){
        const keyResponse = await fetch("/get-api-key");
        const keyData = await keyResponse.json();
        const apiKey = keyData.api_key;

        const prompt = document.getElementById("prompt").value;

        if(apiKey === ""){
            return alert("Insert an API Key!");
        }
        
        const fileData = document.getElementById("homeworkImage");
        const responseDiv = document.getElementById("response");

        if(fileData.files.length === 0){
            return alert("Upload some homework!");
        }
        
        responseDiv.innerText = "Solving...";

        const parts = [{text:prompt}];

        for(let i = 0; i < fileData.files.length; i++){
            try{
                const imgData = await fileToBase64(fileData.files[i]);
                parts.push(imgData);
            }
            catch(e){
                console.error("Error processing file", e);
                responseDiv.innerText = "Error proceessing images.";
                return alert("Error processing images. Please try again.");
            }
        }
        const payload = {
            contents: [{
                parts: parts
            }]
        }
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
            {
                method:"POST",
                headers: { 'Content-Type' : 'application/json'},
                 body: JSON.stringify(payload)
            }
        );
        const result = await response.json();


        console.log(result);

        try{
            currentAIResponse = result.candidates[0].content.parts[0].text;
            console.log(currentAIResponse);
            responseDiv.innerText = result.candidates[0].content.parts[0].text;
            return true;
        }catch(e){
            console.error("Error during API call.", e);
            responseDiv.innerText = "An error occured with the API. Please try again";
            return false;
        }
    }

    async function convertToGcode(){
        const rawResponse = document.getElementById("response").innerText;
        if(!rawResponse || rawResponse.trim() == "" || rawResponse == "Solving..."){
            alert("No AI response to convert. Run AI Solve first!");
            return false;
        }

        document.getElementById("response").innerText = "converting to gcode...";
        currentGCode = await generateGCode(rawResponse, 7);
        currentAIResponse = rawResponse;
        document.getElementById("response").innerText = "successfully converted to gcode!";

        console.log(currentGCode);
        return true;
    }

    async function sendToSD(){
        if(!currentGCode){
            alert("No AI response to convert. Run AI Solve first.");
            return false;
        }
        document.getElementById("response").innerText = "sending to SD card...";

        const folderName = document.getElementById("folderName").value || "HWFolder";
        const fileName = document.getElementById("fileName").value || "HWFile.gcode";

        const fileBlob = new Blob([currentGCode], {type: "text/plain"});

        const formData = new FormData();
        formData.append("file", fileBlob, fileName);

        try{
            const response = await fetch(`/upload-file?folder=${encodeURIComponent(folderName)}`, {
                method: "POST",
                body: formData
            });
            if(response.ok){
                const text = await response.text();
                document.getElementById("response").innerText = text;
                return true;
            }else{
                const text = await response.text();
                document.getElementById("response").innerText = "Failed to send due to error: " + text;
                alert("Failed to send, check error: " + text);
                return false;
            }
        } catch(e){
            console.error("error sending to SD", e);
            document.getElementById("response").innerText = "Network error sending to SD card. Check connection & power source.";
            alert("Error sending to SD card");
            return false;
        }
    }

    async function doAll() {
        const solveSuccess = await solveHomework();
        if(solveSuccess){
            const gcodeSuccess = await convertToGcode();
            if(gcodeSuccess){
                await sendToSD();
            }
        }
    }
</script>

</html>
