<!DOCTYPE html>
<html>

<style>
    body {
        font-family: sans-serif;
        line-height: 1.6;
        color: #333;
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    h1 {
        font-size: 2.5em;
        color: #111;
        margin-bottom: 0.5em;
    }

    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        /* Ensures padding doesn't affect width */
        font-family: inherit;
    }

    button {
        margin-top: 10px;
    }
</style>

<body>
    <h1>Homework Solver V2</h1>

    <label>AI Prompt: </label>
    <input type="text" id="prompt" placeholder="This prompt gets sent to the AI with your files"
        value="Analyze attached homework images. Provide short, brief answers to the questions. Write like a high schooler."></input>


    <label>Upload Homework Image:</label>
    <input type="file" id="homeworkImage" multiple accept="image/*" /></input>

    <label>SD Card Folder: </label>
    <input type="text" id="folderName" placeholder="ex: HomeworkAnswers" value="HWFolder"></input>

    <label>SD Card File Name: </label>
    <input type="text" id="fileName" placeholder="ex: todaysDate.gcode" value="HWFile.gcode"></input>

    <label>Font Size: </label>
    <input type="number" id="fontSize" placeholder="ex: 7" value="7" step="0.5"></input>

    <label>Line Spacing Multiplier: </label>
    <input type="number" id="lineSpacing" placeholder="ex: 1.5" value="1.5" step="0.1"></input>

    <button id="submit" onclick="solveHomework()">1. AI Solve</button>
    <button id="btnGcode" onclick="convertToGcode()">2. Create GCode</button>
    <button id="btnGcode" onclick="sendToSD()">3. Send to SD card</button>

    <button id="btnAll" onclick="doAll()">DO ALL(not recommended)</button>
    <div id="response" contenteditable="true"></div>
</body>

<script src="/font_engine.js"></script>

<script>
    let currentAIResponse = "";
    let currentGCodePages = "";

    async function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const base64Data = reader.result.split(',')[1];
                resolve({
                    inline_data: {
                        mime_type: file.type,
                        data: base64Data
                    }
                });
            };
            reader.onerror = error => reject(error);
        });
    }
    async function solveHomework() {
        const keyResponse = await fetch("/get-api-key");
        const keyData = await keyResponse.json();
        const apiKey = keyData.api_key;

        const prompt = document.getElementById("prompt").value;

        if (apiKey === "") {
            return alert("Insert an API Key!");
        }

        const fileData = document.getElementById("homeworkImage");
        const responseDiv = document.getElementById("response");

        if (fileData.files.length === 0) {
            return alert("Upload some homework!");
        }

        responseDiv.innerText = "Solving...";

        const parts = [{ text: prompt }];

        for (let i = 0; i < fileData.files.length; i++) {
            try {
                const imgData = await fileToBase64(fileData.files[i]);
                parts.push(imgData);
            }
            catch (e) {
                console.error("Error processing file", e);
                responseDiv.innerText = "Error proceessing images.";
                return alert("Error processing images. Please try again.");
            }
        }
        const payload = {
            contents: [{
                parts: parts
            }]
        }
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
            {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }
        );
        const result = await response.json();


        console.log(result);

        try {
            currentAIResponse = result.candidates[0].content.parts[0].text;
            console.log(currentAIResponse);
            responseDiv.innerText = result.candidates[0].content.parts[0].text;
            return true;
        } catch (e) {
            console.error("Error during API call.", e);
            responseDiv.innerText = "An error occured with the API. Please try again";
            return false;
        }
    }

    async function convertToGcode() {
        const rawResponse = document.getElementById("response").innerText;
        if (!rawResponse || rawResponse.trim() == "" || rawResponse == "Solving...") {
            alert("No AI response to convert. Run AI Solve first!");
            return false;
        }

        const fontSize = parseFloat(document.getElementById("fontSize").value) || 7;
        const lineSpacing = parseFloat(document.getElementById("lineSpacing").value) || 1.5;

        document.getElementById("response").innerText = "converting to gcode...";
        currentGCodePages = await generateGCode(rawResponse, fontSize, lineSpacing);
        currentAIResponse = rawResponse;
        document.getElementById("response").innerText = `successfully converted to ${currentGCodePages.length} pages of gcode!`;

        console.log(currentGCodePages);
        return true;
    }

    async function sendToSD() {
        if (!currentGCodePages || currentGCodePages.length === 0) {
            alert("No G-Code pages to send. Run \"Create GCode\" first.");
            return false;
        }
        document.getElementById("response").innerText = `Sending ${currentGCodePages.length} files to SD card...`;

        const folderName = document.getElementById("folderName").value || "HWFolder";
        const fileName = document.getElementById("fileName").value || "HWFile.gcode";


        let baseName = "HWFile";
        let ext = ".gcode";
        const dotIdx = fileName.lastIndexOf(".");
        if (dotIdx !== -1) {
            baseName = fileName.substring(0, dotIdx);
            ext = fileName.substring(dotIdx);
        }

        const MAX_RETRIES = 2;
        let successCount = 0;

        for (let i = 0; i < currentGCodePages.length; i++) {
            const pageGCode = currentGCodePages[i];
            const pageFileName = `${baseName}_page${i + 1}${ext}`;
            const fileBlob = new Blob([pageGCode], { type: "text/plain" });

            let uploaded = false;
            for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
                if (attempt > 0) {
                    document.getElementById("response").innerText += `\nPage ${i + 1}: retry ${attempt}/${MAX_RETRIES}...`;
                    await new Promise(r => setTimeout(r, 1000));
                } else {
                    document.getElementById("response").innerText += `\nUploading page ${i + 1} of ${currentGCodePages.length}`;
                }
                const formData = new FormData();
                formData.append("file", fileBlob, pageFileName);

                try {
                    const response = await fetch(`/upload-file?folder=${encodeURIComponent(folderName)}`, {
                        method: "POST",
                        body: formData
                    });
                    if (response.ok) {
                        const text = await response.text();
                        document.getElementById("response").innerText += `\nSuccessfully sent page ${i + 1}! Message from server: ` + text;
                        // successCount++;
                        uploaded = true;
                        break;
                    } else {
                        const text = await response.text();
                        console.error(`Failed to send page ${i + 1}: `, text);
                        document.getElementById("response").innerText += `\nError occured sending page ${i + 1}. Message from server: ` + text;
                        // alert(`failed to send page ${i + 1}: `, text);
                    }
                } catch (e) {
                    console.error(`failed to send page ${i + 1}: `, e);
                    document.getElementById("response").innerText += `\nError occured sending page ${i + 1}. Possible network error. Message from server: ` + e;
                    // alert(`Error sending to SD card, page ${i + 1}`);
                }
            }
            if (uploaded) {
                successCount++;
            }
        }
        if (successCount === currentGCodePages.length) {
            document.getElementById("response").innerText += `\nSuccesfully saved ${successCount} files to SD Card! Page ${i + 1} uploaded.`;
            return true;
        } else {
            document.getElementById("response").innerText += `\nSaved ${successCount} out of ${currentGCodePages.length} files. Check console or above messages.`;
            return false;
        }
    }
    async function doAll() {
        const solveSuccess = await solveHomework();
        if (solveSuccess) {
            const gcodeSuccess = await convertToGcode();
            if (gcodeSuccess) {
                await sendToSD();
            }
        }
    }
</script>

</html>
